<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do por Voz</title>
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>To-Do por Voz</h1>
        <p>Agendá rápido con texto o voz en formato <strong>fecha - tarea</strong>.</p>
      </header>

      <section class="panel">
        <form id="task-form" class="task-form">
          <label class="field">
            Fecha
            <input id="date-input" type="date" required />
          </label>
          <label class="field">
            Tarea
            <input id="task-input" type="text" placeholder="Ej: Pagar luz" required />
          </label>
          <div class="form-actions">
            <button id="add-btn" type="submit" class="add-btn">Agregar</button>
            <button id="voice-btn" type="button" class="voice-btn" aria-label="Agregar por voz">
              🎤
            </button>
          </div>
        </form>
        <p id="voice-status" class="voice-status">Tip: “mañana - pagar luz”.</p>
        <p id="app-status" class="app-status" aria-live="polite"></p>
      </section>

      <section class="panel">
        <h2>Pendientes</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>Fecha</th>
                <th>Tarea</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="pending-grid"></tbody>
          </table>
          <p id="pending-empty-state" class="empty-state">No hay tareas pendientes.</p>
        </div>
      </section>

      <section class="panel">
        <h2>Hechas</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th></th>
                <th>Fecha</th>
                <th>Tarea</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="completed-grid"></tbody>
          </table>
          <p id="completed-empty-state" class="empty-state">Todavía no completaste tareas.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
