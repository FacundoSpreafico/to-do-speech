<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do por Voz</title>
    <meta name="theme-color" content="#4c5df4" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Planificador personal</p>
          <h1>Mi Agenda por Voz</h1>
        </div>
        <button id="theme-toggle" class="ghost-btn" type="button" aria-label="Cambiar tema">☀️</button>
      </header>

      <section class="context-tabs" aria-label="Contexto de tareas">
        <button id="tab-estudio" class="tab is-active" type="button" data-category="estudio">
          Estudio
        </button>
        <button id="tab-trabajo" class="tab" type="button" data-category="trabajo">Trabajo</button>
      </section>

      <section class="composer">
        <form id="task-form" class="task-form">
          <label class="field">
            Fecha
            <input id="date-input" type="date" required />
          </label>
          <label class="field task-field">
            Tarea
            <input
              id="task-input"
              type="text"
              placeholder="Ej: 4 de abril de 2026 tengo parcial 1"
              required
            />
          </label>
          <div class="action-row">
            <button id="add-btn" type="submit" class="primary-btn">Agregar</button>
            <button id="voice-btn" type="button" class="ghost-btn" aria-label="Agregar por voz">🎤</button>
          </div>
        </form>
        <p id="voice-status" class="hint">Decí: “mañana tengo que hacer guía 4”.</p>
        <p id="app-status" class="status" aria-live="polite"></p>
      </section>

      <section class="board">
        <div class="board-head">
          <h2 id="pending-title">Pendientes</h2>
          <p id="pending-counter" class="counter">0</p>
        </div>
        <ul id="pending-list" class="task-list"></ul>
        <p id="pending-empty" class="empty-state">No hay pendientes en este contexto.</p>
      </section>

      <section class="board board-muted">
        <div class="board-head">
          <h2>Hechas</h2>
          <p id="completed-counter" class="counter">0</p>
        </div>
        <ul id="completed-list" class="task-list"></ul>
        <p id="completed-empty" class="empty-state">Todavía no completaste tareas acá.</p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
