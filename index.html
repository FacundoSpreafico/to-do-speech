<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do por Voz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>To-Do por Voz</h1>
        <p>Di: <strong>fecha - tarea</strong> (ej: "mañana - pagar luz").</p>
      </header>

      <section class="panel">
        <form id="task-form" class="task-form">
          <label>
            Fecha
            <input id="date-input" type="date" required />
          </label>
          <label>
            Tarea
            <input id="task-input" type="text" placeholder="Ej: Pagar luz" required />
          </label>
          <button type="submit">Agregar tarea</button>
        </form>

        <div class="voice-actions">
          <button id="voice-btn" type="button">🎤 Hablar</button>
          <p id="voice-status" class="voice-status">Listo para escuchar.</p>
        </div>
      </section>

      <section class="panel">
        <h2>Agenda</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Tarea</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="task-grid"></tbody>
          </table>
          <p id="empty-state" class="empty-state">Todavía no hay tareas.</p>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
